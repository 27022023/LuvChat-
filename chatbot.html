<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LuvBot – Chat</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #FFB6E9, #AEE6FF);
  }

  /* Header */
  .header {
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(10px);
    padding: 18px;
    text-align: center;
    font-size: 1.6rem;
    font-weight: bold;
    color: #4b3d73;
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .back-btn {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: #ffffff;
    color: #4b3d73;
    border: none;
    padding: 8px 14px;
    border-radius: 999px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }

  /* Personality selector */
  .personality-bar {
    display: flex;
    gap: 10px;
    padding: 10px;
    overflow-x: auto;
  }

  .mode {
    padding: 8px 14px;
    background: white;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    color: #4b3d73;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    white-space: nowrap;
  }

  .mode.active {
    background: #4b3d73;
    color: white;
  }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .bubble {
    max-width: 75%;
    padding: 12px;
    border-radius: 16px;
    margin-bottom: 12px;
    animation: fadeIn 0.3s ease;
  }

  .user {
    background: #ffffff;
    margin-left: auto;
  }

  .bot {
    background: #ffe6f7;
    margin-right: auto;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Input area */
  .input-area {
    display: flex;
    padding: 12px;
    gap: 10px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
  }

  .input-area input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
  }

  .input-area button {
    padding: 12px 18px;
    border-radius: 12px;
    border: none;
    background: #4b3d73;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  /* Typing indicator */
  .typing {
    font-style: italic;
    color: #4b3d73;
    margin-bottom: 10px;
  }
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="location.href='index.html'">← Menu</button>
  LuvBot 💗
</div>

<!-- Personality Selector -->
<div class="personality-bar">
  <button class="mode active" data-mode="calm">Calm</button>
  <button class="mode" data-mode="sweet">Sweet</button>
  <button class="mode" data-mode="sassy">Sassy</button>
  <button class="mode" data-mode="chaotic">Chaotic</button>
  <button class="mode" data-mode="deep">Deep</button>
  <button class="mode" data-mode="logic">Logic</button>
</div>

<!-- Chat -->
<div class="chat" id="chat"></div>

<!-- Input -->
<div class="input-area">
  <input type="text" id="userInput" placeholder="Say something...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
  let mode = "calm";

  const chat = document.getElementById("chat");

  // FIRST MESSAGE
  addBot("Hi I am LuvBot!! Let's chat together!!💗");

  // PERSONALITY RESPONSES
  const responses = {
    calm: (msg) => `I hear you. ${msg} sounds important. Tell me more.`,
    sweet: (msg) => `Aww really? 💗 That’s actually so sweet. What else is on your mind?`,
    sassy: (msg) => `Oh wow, bold of you to say "${msg}". Go on then 😏`,
    chaotic: (msg) => `BRO WHAT DO YOU MEAN "${msg.toUpperCase()}" 💀`,
    deep: (msg) => `Interesting… "${msg}" says a lot about how you're feeling. Why do you think that is?`,
    logic: (msg) => `Analyzing input: "${msg}". Conclusion: valid. Continue.`
  };

  // Add message bubbles
  function addUser(text) {
    const div = document.createElement("div");
    div.className = "bubble user";
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addBot(text) {
    const div = document.createElement("div");
    div.className = "bubble bot";
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  // Typing animation
  function showTyping() {
    const t = document.createElement("div");
    t.className = "typing";
    t.id = "typing";
    t.textContent = "LuvBot is typing...";
    chat.appendChild(t);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  // Send message
  function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    addUser(text);
    input.value = "";

    showTyping();

    setTimeout(() => {
      hideTyping();
      const reply = responses[mode](text);
      addBot(reply);
    }, 700);
  }

  // Switch personality
  document.querySelectorAll(".mode").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".mode").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      mode = btn.dataset.mode;
    });
  });
</script>

</body>
</html>
