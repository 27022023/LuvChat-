<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LuvChat</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      color: #ffffff;
    }

    /* Cotton candy gradient */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #FFB6E9, #AEE6FF);
      z-index: -1;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    /* BIGGER LOGO */
    .logo {
      font-family: "Brush Script MT", "Lucida Handwriting", cursive;
      font-size: 26vw;
      color: #ffffff;
      text-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      margin-bottom: 60px;
      line-height: 1;
    }

    /* BIGGER MENU BUTTON */
    .menu-button {
      padding: 28px 70px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.95);
      color: #7b5ba8;
      font-size: 2rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      transition: 0.15s ease;
    }

    .menu-button:hover {
      transform: translateY(-3px);
      background: #ffffff;
    }

    /* BIGGER MENU PANEL */
    .menu-panel {
      margin-top: 35px;
      padding: 35px 40px;
      border-radius: 30px;
      background: #ffc2da;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      display: none;
      flex-direction: column;
      gap: 25px;
      min-width: 300px;
    }

    .menu-panel.open {
      display: flex;
    }

    /* BIGGER MENU ITEMS */
    .menu-item {
      padding: 22px 25px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.95);
      color: #7b5ba8;
      font-size: 1.7rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: 0.15s ease;
    }

    .menu-item:hover {
      background: #ffe6f1;
      transform: translateY(-2px);
    }

    /* Floating settings button */
    .settings-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #ffffff;
      color: #7b5ba8;
      font-size: 2.4rem;
      border: none;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: 0.2s ease;
    }

    .settings-btn:hover {
      transform: scale(1.1);
      background: #f7e9ff;
    }
  </style>
</head>

<body>

  <main class="hero">
    <h1 class="logo">LuvChat</h1>

    <button id="menuButton" class="menu-button">Menu</button>

    <div id="menuPanel" class="menu-panel">
      <button class="menu-item" onclick="location.href='chatlist.html'">Chat</button>
      <button class="menu-item" onclick="location.href='call.html'">Phone Call</button>
      <button class="menu-item" onclick="location.href='facetime.html'">FaceTime</button>
      <button class="menu-item" onclick="location.href='chatbot.html'">LuvBot 🤖💗</button>
      
    </div>
  </main>

  <!-- Floating settings button -->
  <button class="settings-btn" onclick="location.href='settings.html'">⚙️</button>

  <script>
    const menuButton = document.getElementById("menuButton");
    const menuPanel = document.getElementById("menuPanel");

    menuButton.addEventListener("click", () => {
      menuPanel.classList.toggle("open");
    });
  </script>

</body>
</html>
