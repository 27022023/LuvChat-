<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LuvChat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      color: #ffffff;
    }

    /* Background gradient: lilac, baby blue, baby pink */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top left, #e3b8ff 0, transparent 50%),
                  radial-gradient(circle at top right, #b8d9ff 0, transparent 50%),
                  radial-gradient(circle at bottom, #ffbfd6 0, transparent 55%);
      background-color: #f7e9ff;
      z-index: -1;
    }

    /* Centered hero content */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    /* EVEN BIGGER LuvChat logo */
    .logo {
      font-family: "Brush Script MT", "Lucida Handwriting", cursive;
      font-size: 22vw; /* HUGE */
      color: #ffffff;
      text-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      margin-bottom: 50px;
      line-height: 1;
    }

    /* Bigger Menu button */
    .menu-button {
      padding: 20px 50px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.95);
      color: #7b5ba8;
      font-size: 1.6rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      transition: 0.15s ease;
    }

    .menu-button:hover {
      transform: translateY(-3px);
      background: #ffffff;
    }

    /* Bigger Menu panel */
    .menu-panel {
      margin-top: 25px;
      padding: 25px 30px;
      border-radius: 25px;
      background: #ffc2da;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      display: none;
      flex-direction: column;
      gap: 18px;
      min-width: 260px;
    }

    .menu-panel.open {
      display: flex;
    }

    /* Bigger menu items */
    .menu-item {
      padding: 16px 20px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.95);
      color: #7b5ba8;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: 0.15s ease;
    }

    .menu-item:hover {
      background: #ffe6f1;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <main class="hero">
    <h1 class="logo">LuvChat</h1>

    <button id="menuButton" class="menu-button">Menu</button>

    <div id="menuPanel" class="menu-panel">
      <button class="menu-item" onclick="location.href='chatlist.html'">Chat</button>
      <button class="menu-item" onclick="location.href='call.html'">Phone call</button>
      <button class="menu-item" onclick="location.href='facetime.html'">FaceTime call</button>
      <button class="menu-item" onclick="location.href='posts.html'">Posts</button>
    </div>
  </main>

  <script>
    const menuButton = document.getElementById("menuButton");
    const menuPanel = document.getElementById("menuPanel");

    menuButton.addEventListener("click", () => {
      menuPanel.classList.toggle("open");
    });
  </script>

</body>
</html>
